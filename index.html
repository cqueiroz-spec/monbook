<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Book 4</title>
    
    <!-- Optimisations iOS pour éviter le rechargement blanc et la lenteur -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Book 4">

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;900&family=Playfair+Display:ital,wght@1,900&family=JetBrains+Mono:wght@800&family=Dancing+Script:wght@700&family=Montserrat:ital,wght@0,900;1,900&display=swap');

        :root { --fixed-vh: 100vh; }

        body, html {
            margin: 0; padding: 0; height: var(--fixed-vh); width: 100%; background-color: #000;
            font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;
            -webkit-font-smoothing: antialiased; overflow: hidden; position: fixed;
            touch-action: manipulation;
        }

        #loader-overlay {
            position: fixed; inset: 0; background: #000; z-index: 9999;
            display: flex; align-items: center; justify-content: center;
            transition: opacity 0.5s ease; pointer-events: none;
        }

        #bg-fixed-layer {
            position: fixed; top: 0; left: 0; width: 100vw; height: var(--fixed-vh); z-index: 1;
            background-color: #000; background-size: contain; background-position: center center;
            background-repeat: no-repeat; transition: background-image 0.8s ease-in-out;
            background-image: linear-gradient(180deg, #001219 0%, #002533 100%);
        }

        #portrait-container {
            position: relative; width: 100%; max-width: 420px; height: var(--fixed-vh);
            margin: 0 auto; z-index: 10; background: transparent; perspective: 1200px;
        }

        .scrolling-zone {
            position: absolute; left: 0; width: 100%; height: 60px; display: flex;
            align-items: center; overflow: hidden; z-index: 25; pointer-events: none;
            top: 45%; transition: top 0.3s ease;
        }

        #texte-coulissant {
            white-space: nowrap; position: absolute; font-size: 2.2rem; font-weight: 900;
            text-shadow: 0 0 20px rgba(0, 0, 0, 0.6); letter-spacing: -0.02em;
            color: #ffffff; will-change: transform;
        }

        /* --- Menu Mana --- */
        #circular-menu-wrapper {
            position: absolute; top: 32%; left: 50%; width: 140px; height: 140px;
            z-index: 100; pointer-events: none; display: flex; align-items: center;
            justify-content: center; transform-style: preserve-3d;
            transform: translate(-50%, -50%) rotateX(45deg) scale(0);
            opacity: 0; transition: all 0.3s ease; visibility: hidden;
        }
        #circular-menu-wrapper.ui-visible { opacity: 1; transform: translate(-50%, -50%) rotateX(45deg) scale(1); visibility: visible; }
        
        #menu-ring { position: relative; width: 100%; height: 100%; transform-style: preserve-3d; }
        .spin-animation { animation: spinRing 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes spinRing { 0% { transform: rotateZ(-720deg); } 100% { transform: rotateZ(0deg); } }

        .btn-circular {
            position: absolute; width: 22px; height: 22px; border-radius: 50%;
            background: rgba(255, 255, 255, 0.25); backdrop-filter: blur(8px);
            border: 1.5px solid rgba(255, 255, 255, 0.7); display: flex;
            align-items: center; justify-content: center; color: white;
            pointer-events: auto; transform: translate(-50%, -50%) rotateX(-45deg);
            box-shadow: 0 2px 6px rgba(0,0,0,0.4);
            transition: all 0.4s ease; z-index: 5; cursor: pointer;
        }
        .btn-circular:nth-child(1) { top: 0%; left: 50%; }
        .btn-circular:nth-child(2) { top: 14.6%; left: 85.4%; }
        .btn-circular:nth-child(3) { top: 50%; left: 100%; }
        .btn-circular:nth-child(4) { top: 85.4%; left: 85.4%; }
        .btn-circular:nth-child(5) { top: 100%; left: 50%; }
        .btn-circular:nth-child(6) { top: 85.4%; left: 14.6%; }
        .btn-circular:nth-child(7) { top: 50%; left: 0%; }
        .btn-circular:nth-child(8) { top: 14.6%; left: 14.6%; }

        /* --- Zone Note Verre --- */
        #glass-note-modal {
            position: absolute; inset: 15% 5% 35% 5%; z-index: 3000;
            display: none; align-items: center; justify-content: center;
        }
        #glass-note-modal.active { display: flex; }

        .glass-note-content {
            width: 100%; height: 100%; background: rgba(255, 255, 255, 0.38); 
            backdrop-filter: saturate(150%) blur(20px); -webkit-backdrop-filter: saturate(150%) blur(20px);
            border-radius: 32px; position: relative; opacity: 0; transition: opacity 0.5s ease;
        }
        #glass-note-modal.active .glass-note-content { opacity: 1; }

        #glass-textarea {
            width: 100%; height: 100%; background: transparent; border: none;
            outline: none; color: white; font-size: 22px; font-weight: 800;
            text-align: center; overflow-y: auto; padding: 80px 20px; 
            text-shadow: 0 2px 10px rgba(0,0,0,0.5); display: block;
        }

        #bottom-panel {
            position: absolute; bottom: 0; width: 100%; padding: 20px 25px calc(20px + env(safe-area-inset-bottom)) 25px;
            background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 100%);
            z-index: 50; transition: all 0.4s ease; opacity: 0;
            transform: translateY(20px); pointer-events: auto;
        }
        #bottom-panel.ui-visible { opacity: 1; transform: translateY(0); }

        #sync-indicator {
            position: absolute; bottom: calc(10px + env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%);
            font-size: 8px; text-transform: uppercase; letter-spacing: 4px; color: rgba(255, 255, 255, 0.4); pointer-events: none;
        }
        
        input[type="range"] { -webkit-appearance: none; background: rgba(255,255,255,0.2); height: 2px; border-radius: 2px; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; background: white; border-radius: 50%; box-shadow: 0 0 10px white; }
    </style>
    
    <!-- SCRIPT MÉMOIRE LOCALE (Affichage instantané) -->
    <script>
        (function() {
            const cached = localStorage.getItem('book_cache_v4');
            if (cached) {
                const data = JSON.parse(cached);
                const fonts = ["Inter", "Playfair Display", "JetBrains Mono", "Dancing Script", "Montserrat"];
                document.addEventListener('DOMContentLoaded', () => {
                    const txt = document.getElementById('texte-coulissant');
                    const bg = document.getElementById('bg-fixed-layer');
                    const area = document.getElementById('glass-textarea');
                    const inp = document.getElementById('input-note');
                    if(data.text) { txt.textContent = data.text; if(inp) inp.value = data.text; }
                    if(data.bg) bg.style.backgroundImage = `url('${data.bg}')`;
                    if(data.color) txt.style.color = data.color;
                    if(data.pencilNoteRich) area.innerHTML = data.pencilNoteRich;
                    if(data.fontIdx !== undefined) txt.style.fontFamily = `'${fonts[data.fontIdx]}', sans-serif`;
                });
            }
        })();
    </script>
</head>
<body onclick="handleGlobalClick(event)">

    <div id="loader-overlay">
        <div class="w-8 h-8 border-2 border-white/20 border-t-white rounded-full animate-spin"></div>
    </div>

    <div id="bg-fixed-layer"></div>

    <div id="portrait-container">
        <!-- MODAL NOTE -->
        <div id="glass-note-modal">
            <div class="glass-note-content" onclick="event.stopPropagation()">
                <div class="absolute top-8 right-8 cursor-pointer z-[3200]" onclick="closeGlassNote(event)">
                    <div class="w-2 h-2 bg-white rounded-full shadow-[0_0_10px_white]"></div>
                </div>
                <div id="glass-textarea" contenteditable="true" placeholder="Note..."></div>
            </div>
        </div>

        <!-- MENU CIRCULAIRE -->
        <div id="circular-menu-wrapper">
            <div id="menu-ring">
                <div class="btn-circular" onclick="handleAction(event, 'gallery')">🖼️</div>
                <div class="btn-circular" onclick="handleAction(event, 'book')">📖</div>
                <div class="btn-circular">
                    <input type="color" class="absolute inset-0 opacity-0" oninput="handleAction(event, 'color_live')" onchange="handleAction(event, 'color_final')">🎨
                </div>
                <div class="btn-circular" onclick="handleAction(event, 'font')">Aa</div>
                <div class="btn-circular" onclick="handleAction(event, 'reset')">🔄</div>
                <div class="btn-circular" onclick="handleAction(event, 'pencil')">✏️</div>
                <div class="btn-circular" onclick="handleAction(event, 'files')">📁</div>
                <div class="btn-circular" onclick="handleAction(event, 'music_toggle')">🎵</div>
            </div>
        </div>

        <!-- TEXTE DÉFILANT -->
        <div class="scrolling-zone">
            <span id="texte-coulissant">Synchronisation...</span>
        </div>

        <!-- PANNEAU ÉDITION -->
        <div id="bottom-panel" onclick="event.stopPropagation()">
            <textarea id="input-note" rows="1" class="w-full bg-white/10 border border-white/20 rounded-2xl p-4 text-white outline-none focus:border-white/40 transition-all" placeholder="Écris ici..."></textarea>
            <div class="w-full py-6">
                <input type="range" id="vitesse-range" min="0" max="80" value="20" class="w-full">
            </div>
        </div>

        <div id="sync-indicator">SYNK...</div>
        
        <!-- INPUTS CACHÉS -->
        <input type="file" id="bg-upload" class="hidden" accept="image/*" onchange="processFile(event, 'bg')">
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // CONFIGURATION FIREBASE
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'book-turbo-v4';
        const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'main');

        const els = {
            txt: document.getElementById('texte-coulissant'),
            bg: document.getElementById('bg-fixed-layer'),
            input: document.getElementById('input-note'),
            vit: document.getElementById('vitesse-range'),
            loader: document.getElementById('loader-overlay'),
            sync: document.getElementById('sync-indicator'),
            circ: document.getElementById('circular-menu-wrapper'),
            menu: document.getElementById('menu-ring'),
            modal: document.getElementById('glass-note-modal'),
            area: document.getElementById('glass-textarea'),
            bottom: document.getElementById('bottom-panel')
        };

        const fonts = ["Inter", "Playfair Display", "JetBrains Mono", "Dancing Script", "Montserrat"];
        let currentFont = 0;
        let unsubFirestore = null;

        // AUTHENTIFICATION STRICTE
        const initAuth = async () => {
          try {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
              await signInWithCustomToken(auth, __initial_auth_token);
            } else {
              await signInAnonymously(auth);
            }
          } catch (err) {
            console.error("Auth error:", err);
            els.sync.textContent = "ERREUR AUTH";
            els.sync.style.color = "#ef4444";
          }
        };

        // ÉCOUTEUR D'ÉTAT AUTH POUR FIRESTORE
        onAuthStateChanged(auth, (user) => {
            if (user) {
                // Nettoyer l'ancien listener si présent
                if (unsubFirestore) unsubFirestore();

                // Lancer le listener Firestore seulement si authentifié
                unsubFirestore = onSnapshot(docRef, (snap) => {
                    if (snap.exists()) {
                        const data = snap.data();
                        localStorage.setItem('book_cache_v4', JSON.stringify(data));
                        updateUI(data);
                    }
                    els.loader.style.opacity = '0';
                    setTimeout(() => els.loader.remove(), 500);
                    els.sync.textContent = "GRAVÉ";
                    els.sync.style.color = "#4ade80";
                }, (err) => {
                    console.error("Firestore error:", err);
                    els.sync.textContent = "ERREUR SYNC";
                    els.sync.style.color = "#ef4444";
                });
            }
        });

        initAuth();

        function updateUI(data) {
            if (data.text !== undefined && document.activeElement !== els.input) {
                els.txt.textContent = data.text || "Book...";
                els.input.value = data.text;
            }
            if (data.bg) els.bg.style.backgroundImage = `url('${data.bg}')`;
            if (data.color) els.txt.style.color = data.color;
            if (data.pencilNoteRich) els.area.innerHTML = data.pencilNoteRich;
            if (data.fontIdx !== undefined) {
                currentFont = data.fontIdx;
                els.txt.style.fontFamily = `'${fonts[currentFont]}', sans-serif`;
            }
        }

        window.saveData = async (updates) => {
            if (!auth.currentUser) return;
            try {
                await setDoc(docRef, updates, { merge: true });
                const cache = JSON.parse(localStorage.getItem('book_cache_v4') || '{}');
                localStorage.setItem('book_cache_v4', JSON.stringify({...cache, ...updates}));
            } catch (err) {
                console.error("Save error:", err);
            }
        };

        window.handleAction = (e, type) => {
            e.stopPropagation();
            if (type === 'pencil') {
                els.modal.style.display = 'flex';
                setTimeout(() => { els.modal.classList.add('active'); els.area.focus(); }, 50);
            } else if (type === 'font') {
                currentFont = (currentFont + 1) % fonts.length;
                window.saveData({ fontIdx: currentFont });
            } else if (type === 'gallery') document.getElementById('bg-upload').click();
            else if (type === 'reset') {
                if(confirm("Tout effacer ?")) {
                    localStorage.removeItem('book_cache_v4');
                    window.saveData({ text: "", bg: "", pencilNoteRich: "" });
                    location.reload();
                }
            }
        };

        window.closeGlassNote = (e) => {
            e.stopPropagation();
            window.saveData({ pencilNoteRich: els.area.innerHTML });
            els.modal.classList.remove('active');
            setTimeout(() => els.modal.style.display = 'none', 300);
        };

        window.handleGlobalClick = () => {
            if (els.modal.classList.contains('active')) return;
            els.menu.classList.remove('spin-animation');
            void els.menu.offsetWidth;
            els.menu.classList.add('spin-animation');
            els.circ.classList.toggle('ui-visible');
            els.bottom.classList.toggle('ui-visible');
        };

        els.input.addEventListener('input', e => {
            els.txt.textContent = e.target.value || "Book...";
            window.saveData({ text: e.target.value });
        });

        window.processFile = (e, mode) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = ev => {
                if (mode === 'bg') window.saveData({ bg: ev.target.result });
            };
            reader.readAsDataURL(file);
        };

        // Animation de défilement fluide
        let pos = window.innerWidth;
        function loop() {
            const s = parseInt(els.vit.value);
            if (s > 0) {
                pos -= (s / 12);
                if (pos < -els.txt.offsetWidth) pos = window.innerWidth;
                els.txt.style.transform = `translateX(${pos}px)`;
            }
            requestAnimationFrame(loop);
        }
        loop();
    </script>
</body>
</html>
