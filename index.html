 <!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Book 4</title>
    
    <!-- Optimisations iOS pour une expérience App fluide -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Book 4">

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap');
        
        body, html { 
            margin: 0; padding: 0; height: 100vh; background-color: #000; 
            font-family: 'Inter', sans-serif; overflow: hidden; position: fixed; width: 100%; 
        }

        #bg { 
            position: fixed; inset: 0; 
            background: linear-gradient(180deg, #001219 0%, #002533 100%); 
            z-index: 1; 
        }

        .scrolling-zone { 
            position: absolute; top: 45%; width: 100%; height: 60px; 
            display: flex; align-items: center; overflow: hidden; z-index: 10; 
        }

        #texte-coulissant { 
            white-space: nowrap; position: absolute; font-size: 2.2rem; 
            font-weight: 900; color: #fff; will-change: transform; 
            text-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        #status { 
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); 
            font-size: 10px; color: rgba(255,255,255,0.3); z-index: 100; 
            text-transform: uppercase; letter-spacing: 2px; 
        }

        /* Petit rond de chargement discret */
        #mini-loader {
            position: fixed; top: 20px; right: 20px; width: 12px; height: 12px;
            border: 2px solid rgba(255,255,255,0.1); border-top-color: #fff;
            border-radius: 50%; animation: spin 1s linear infinite; z-index: 100;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="mini-loader"></div>
    <div id="bg"></div>
    
    <div class="scrolling-zone">
        <span id="texte-coulissant">Bienvenue sur Book 4...</span>
    </div>

    <div id="status">INITIALISATION...</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- CONFIGURATION FIREBASE ---
        // Remplace les XXXXX par tes codes Firebase pour activer la synchro
        const firebaseConfig = {
            apiKey: "XXXXX",
            authDomain: "XXXXX.firebaseapp.com",
            projectId: "XXXXX",
            storageBucket: "XXXXX.appspot.com",
            messagingSenderId: "XXXXX",
            appId: "XXXXX"
        };

        const txt = document.getElementById('texte-coulissant');
        const status = document.getElementById('status');
        const loader = document.getElementById('mini-loader');

        // 1. CHARGEMENT IMMÉDIAT (Anti-lenteur)
        // On regarde si on a déjà des notes enregistrées sur l'iPad
        const cache = localStorage.getItem('book_cache_v4');
        if (cache) {
            const data = JSON.parse(cache);
            txt.textContent = data.text || "Book 4";
            status.textContent = "MODE HORS-LIGNE";
        }

        // 2. TENTATIVE DE SYNCHRONISATION
        try {
            if (firebaseConfig.apiKey !== "XXXXX") {
                const app = initializeApp(firebaseConfig);
                const auth = getAuth(app);
                const db = getFirestore(app);
                
                signInAnonymously(auth).then(() => {
                    status.textContent = "SYNCHRONISÉ";
                    status.style.color = "#4ade80";
                    loader.style.display = 'none';

                    const docRef = doc(db, 'artifacts', 'book4', 'public', 'data', 'main');
                    onSnapshot(docRef, (snap) => {
                        if (snap.exists()) {
                            const data = snap.data();
                            txt.textContent = data.text;
                            // On sauve dans la mémoire de l'iPad pour la prochaine fois
                            localStorage.setItem('book_cache_v4', JSON.stringify(data));
                        }
                    });
                });
            } else {
                // Si pas de codes Firebase, on enlève le loader après 2 secondes
                setTimeout(() => { 
                    loader.style.display = 'none';
                    status.textContent = "PRÊT (LOCAL)";
                }, 2000);
            }
        } catch (e) {
            loader.style.display = 'none';
            status.textContent = "ERREUR SYNC";
        }

        // 3. ANIMATION FLUIDE
        let pos = window.innerWidth;
        function animate() {
            pos -= 2; // Vitesse du texte
            if (pos < -txt.offsetWidth) pos = window.innerWidth;
            txt.style.transform = `translateX(${pos}px)`;
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
